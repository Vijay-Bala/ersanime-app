name: ersa
description: "ERSA - Anime, Movies & Series streaming app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.1.5
  http: ^1.6.0
  cached_network_image: ^3.4.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  flutter_screenutil: ^5.9.3
  flutter_animate: ^4.5.2
  android_pip: ^2.0.2
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#050508"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#050508"
  image: assets/splash.png
  android: true
  ios: true
  android_12:
    color: "#050508"
    image: assets/splash.png
    icon_background_color: "#050508"

flutter:
  uses-material-design: true
  assets:
    - assets/